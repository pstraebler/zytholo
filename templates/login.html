<!DOCTYPE html>
<html lang="{{ lang|default('fr') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zytholo - Connexion</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="csrf-token" content="{{ csrf_token() }}">
</head>
<body class="login-page" data-i18n-title="page_login_title" data-force-browser-language="true">
    <div class="login-container">
        <div class="login-box">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Zytholo" class="login-logo">
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="form-group">
                    <label for="username" data-i18n="login_username">Pseudo</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password" data-i18n="login_password">Mot de passe</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                {% if error %}
                    <div class="error">{{ error }}</div>
                {% endif %}
                
                <button type="submit" class="btn-primary" data-i18n="login_button">Connexion</button>
            </form>
        </div>
    </div>
     <div class="bottom-message">
        <p><a href="https://github.com/pstraebler/zytholo">Zytholo</a> v3.0.1 - Developed with 🍺 by <a href="https://pierre.straebler.fr">Pierre Straebler</a> (and a lot of AI)</p>
     </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
    <script src="{{ url_for('static', filename='js/i18n.js') }}"></script>
</body>
</html>
