services:
  mariadb:
    image: mariadb:11
    container_name: zytholo-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  zytholo:
    build: .
    container_name: zytholo-app
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:${APP_PORT}"
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - .env
    command: python app.py
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen(f\"http://127.0.0.1:{os.environ['APP_PORT']}/healthz\", timeout=3)"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mariadb_data:
    driver: local
